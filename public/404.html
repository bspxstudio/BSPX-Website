<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <meta name="theme-color" content="#0A0A0A" />
    <title>404 - Page Not Found | BSPX Studio</title>
    <meta name="description" content="The page you're looking for doesn't exist. Explore BSPX Studio's professional photography services in Coimbatore and across India." />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Montserrat:wght@400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #0A0A0A;
        color: #FAFAFA;
        font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      /* Animated Background */
      .bg-glow {
        position: fixed;
        border-radius: 50%;
        filter: blur(120px);
        opacity: 0.15;
        pointer-events: none;
      }

      .bg-glow-1 {
        width: 600px;
        height: 600px;
        background: #D4A53A;
        top: -200px;
        left: -200px;
        animation: float 20s ease-in-out infinite;
      }

      .bg-glow-2 {
        width: 500px;
        height: 500px;
        background: #FF7A00;
        bottom: -150px;
        right: -150px;
        animation: float 25s ease-in-out infinite reverse;
      }

      @keyframes float {
        0%, 100% { transform: translate(0, 0) scale(1); }
        50% { transform: translate(50px, 30px) scale(1.1); }
      }

      .container {
        position: relative;
        z-index: 10;
        text-align: center;
        padding: 2rem;
        max-width: 700px;
      }

      .error-code {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 10rem;
        line-height: 1;
        background: linear-gradient(135deg, #D4A53A 0%, #FF7A00 50%, #D4A53A 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: 0.05em;
      }

      @media (min-width: 768px) {
        .error-code {
          font-size: 14rem;
        }
      }

      h1 {
        font-family: 'Montserrat', sans-serif;
        font-size: 1.5rem;
        font-weight: 700;
        margin-top: 0.5rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      @media (min-width: 768px) {
        h1 {
          font-size: 2rem;
        }
      }

      p {
        font-size: 1rem;
        color: rgba(255, 255, 255, 0.6);
        margin-top: 1rem;
        line-height: 1.8;
        max-width: 480px;
        margin-left: auto;
        margin-right: auto;
      }

      .divider {
        width: 60px;
        height: 2px;
        background: linear-gradient(90deg, #D4A53A, #FF7A00);
        margin: 1.5rem auto;
      }

      .btn-group {
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        justify-content: center;
        margin-top: 2rem;
      }

      .btn-primary {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: #D4A53A;
        color: #0A0A0A;
        padding: 0.875rem 2rem;
        font-family: 'Montserrat', sans-serif;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        text-decoration: none;
        border: none;
        cursor: pointer;
        transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      }

      .btn-primary:hover {
        background: #FF7A00;
        transform: translateY(-2px);
        box-shadow: 0 10px 30px rgba(212, 165, 58, 0.3);
      }

      .btn-secondary {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: transparent;
        color: #FAFAFA;
        padding: 0.875rem 2rem;
        font-family: 'Montserrat', sans-serif;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        text-decoration: none;
        border: 1px solid rgba(255, 255, 255, 0.2);
        cursor: pointer;
        transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      }

      .btn-secondary:hover {
        border-color: #D4A53A;
        color: #D4A53A;
        transform: translateY(-2px);
      }

      .nav-links {
        display: flex;
        flex-wrap: wrap;
        gap: 1.5rem;
        justify-content: center;
        margin-top: 2.5rem;
        padding-top: 2.5rem;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
      }

      .nav-links a {
        color: rgba(255, 255, 255, 0.4);
        text-decoration: none;
        font-size: 0.8rem;
        font-weight: 500;
        letter-spacing: 0.05em;
        transition: color 0.3s ease;
        text-transform: uppercase;
      }

      .nav-links a:hover {
        color: #D4A53A;
      }

      .brand {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 1.2rem;
        letter-spacing: 0.1em;
        color: rgba(255, 255, 255, 0.3);
        margin-top: 2rem;
      }

      .brand span {
        color: #D4A53A;
      }
    </style>
  </head>
  <body>

    <!-- Animated Background Glows -->
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <div class="container">
      <div class="error-code">404</div>
      <h1>Page Not Found</h1>
      <div class="divider"></div>
      <p>
        The page you are looking for doesn't exist or has been moved.
        Let's get you back on track.
      </p>

      <div class="btn-group">
        <a href="/" class="btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
          </svg>
          Homepage
        </a>
        <a href="/services" class="btn-secondary">Our Services</a>
        <a href="/contact" class="btn-secondary">Contact Us</a>
      </div>

      <div class="nav-links">
        <a href="/portfolio">Portfolio</a>
        <a href="/about">About</a>
        <a href="/blog">Blog</a>
        <a href="/testimonials">Testimonials</a>
        <a href="/faq">FAQ</a>
      </div>

      <div class="brand">
        BSPX <span>Studio</span>
      </div>
    </div>

  </body>
</html>
